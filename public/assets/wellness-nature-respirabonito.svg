<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Pausa de bienestar en la naturaleza</title>
  <desc id="desc">Ilustración suave con árboles, personas caminando y una figura meditando junto a un sendero.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="1" stop-color="#f3dbe0"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" x2="1">
      <stop offset="0" stop-color="#cfdcc4"/>
      <stop offset="1" stop-color="#fbfbe1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <style>
      .leaf{transform-origin:center bottom;animation:sway 5s ease-in-out infinite}.leaf.b{animation-delay:-1.2s}.leaf.c{animation-delay:-2.1s}.walk{animation:walk 12s linear infinite}.walk.two{animation-delay:-5.4s}.breath{transform-origin:center;animation:breath 5.5s ease-in-out infinite}@keyframes sway{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(2deg)}}@keyframes walk{0%{transform:translateX(-60px);opacity:0}15%,80%{opacity:1}100%{transform:translateX(80px);opacity:0}}@keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}@media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
