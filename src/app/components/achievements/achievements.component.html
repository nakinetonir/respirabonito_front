<section class="rb-authority" aria-labelledby="experiencia-title">
  <div class="shell">
    <div class="rb-authority__heading">
      <h2 id="experiencia-title" class="rb-section-title rb-kicker rb-component-first-text">Durante 6 años he trabajado como profesora de Yoga, Pilates, Meditación, educación alternativa y otras disciplinas holísticas</h2>
      <p>
        Estos son algunos de los éxitos y reconocimientos que sostienen la propuesta de la Escuela RespiraBonito.
      </p>
    </div>

    <div class="rb-authority__grid">
      <article class="rb-authority__card" *ngFor="let a of achievements">
        <span class="rb-authority__icon"><mat-icon aria-hidden="true">{{ a.icon }}</mat-icon></span>
        <div>
          <h3>{{ a.title }}</h3>
          <p>{{ a.text }}</p>
        </div>
      </article>
    </div>
  </div>
</section>
