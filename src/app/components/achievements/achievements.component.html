<section id="experiencia" class="rb-authority" aria-labelledby="experiencia-title">
  <div class="shell">
    <div class="rb-authority__heading">
      <p class="rb-kicker">Autoridad</p>
      <h2 id="experiencia-title">Autoridad</h2>
      <p>
        Durante 6 años he trabajado como profesora de Yoga, Pilates, Meditación, educación alternativa y otras disciplinas holísticas con estos éxitos:
      </p>
    </div>

    <div class="rb-authority__grid">
      <article class="rb-authority__card" *ngFor="let a of achievements">
        <span class="rb-authority__icon"><mat-icon aria-hidden="true">{{ a.icon }}</mat-icon></span>
        <div>
          <h3>{{ a.title }}</h3>
          <p>{{ a.text }}</p>
        </div>
      </article>
    </div>

    <img
      src="/assets/experiencia-certificaciones.png"
      alt="Logos y certificaciones de la experiencia de RespiraBonito"
      loading="lazy"
      decoding="async"
      class="mx-auto mt-12 max-w-4xl rounded-[2rem] shadow-xl"
    >
  </div>
</section>
