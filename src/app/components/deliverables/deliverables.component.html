<section id="disciplinas" class="rb-disciplines" aria-labelledby="disciplinas-title">
  <div class="rb-nature-side rb-nature-side--left" aria-hidden="true">
    <span class="tree tree--one"></span>
    <span class="tree tree--two"></span>
    <span class="walker walker--one"><i></i></span>
    <span class="walker walker--three"><i></i></span>
  </div>
  <div class="rb-nature-side rb-nature-side--right" aria-hidden="true">
    <span class="tree tree--three"></span>
    <span class="tree tree--four"></span>
    <span class="walker walker--two"><i></i></span>
    <span class="walker walker--four"><i></i></span>
  </div>

  <div class="shell rb-disciplines__shell">
    <h2 id="disciplinas-title" class="rb-section-title rb-kicker rb-component-first-text">Yoga, Pilates, QiGong/Chikung y otras técnicas corporales</h2>
    <p class="rb-disciplines__intro">
      Prácticas corporales para sentir, tonificar y despertar chakras, junto a propuestas de meditación, rituales, alimentación adecuada a cada estación y expresión corporal.
    </p>

    <div class="rb-disciplines__grid">
      <article
        class="rb-discipline"
        *ngFor="let icon of icons; let i = index"
        [attr.style]="'--i:' + i"
        [attr.aria-label]="icon.title + ' — ' + icon.micro"
        tabindex="0"
      >
        <div class="rb-discipline__flip">
          <div class="rb-discipline__face rb-discipline__face--front">
            <span class="rb-discipline__halo" aria-hidden="true"></span>
            <img [src]="icon.src" [alt]="icon.title" class="rb-discipline__image" loading="lazy" decoding="async">
          </div>

          <div class="rb-discipline__face rb-discipline__face--back" aria-hidden="true">
            <div class="rb-discipline__back-content">
              <span>{{ icon.title }}</span>
              <small>{{ icon.micro }}</small>
            </div>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
