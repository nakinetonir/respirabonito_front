<section id="disciplinas" class="section bg-rb-cream">
  <div class="shell">
    <h2 class="title text-center">Un viaje por cuerpo, mente y alma</h2>
    <p class="mx-auto mt-5 max-w-3xl text-center text-lg leading-8 text-rb-ink/70">Exploraremos chakras, movimiento consciente, naturaleza, rituales, arte, alimentación de temporada y encuentros con colaboradoras expertas.</p>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-5 mt-12">
      <div class="text-center" *ngFor="let icon of icons">
        <img [src]="icon.src" [alt]="icon.title" class="mx-auto w-full max-w-[210px] rounded-full drop-shadow-md">
      </div>
    </div>
  </div>
</section>
