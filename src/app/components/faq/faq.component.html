<section id="faq" class="section bg-rb-cream">
  <div class="shell">
    <h2 class="title text-center">Preguntas frecuentes</h2>
    <mat-accordion class="mt-12 block">
      <mat-expansion-panel *ngFor="let f of faqs">
        <mat-expansion-panel-header><mat-panel-title>{{f.q}}</mat-panel-title></mat-expansion-panel-header>
        <p class="leading-7 text-rb-ink/75">{{f.a}}</p>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</section>
