<section id="faq" class="rb-faq" aria-labelledby="faq-title">
  <div class="shell">
    <div class="rb-faq__heading">
      <p class="rb-kicker">FAQs/ Preguntas Frecuentes</p>
      <h2 id="faq-title">FAQs/ Preguntas Frecuentes</h2>
    </div>

    <mat-accordion class="rb-faq__accordion" multi>
      <mat-expansion-panel *ngFor="let f of faqs" class="rb-faq__panel">
        <mat-expansion-panel-header>
          <mat-panel-title>
            <span class="rb-faq__icon"><mat-icon aria-hidden="true">{{ f.icon }}</mat-icon></span>
            <span>{{ f.q }}</span>
          </mat-panel-title>
        </mat-expansion-panel-header>
        <p class="rb-faq__answer">{{ f.a }}</p>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</section>
