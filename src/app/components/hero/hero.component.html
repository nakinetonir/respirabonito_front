<section id="inicio" class="rb-hero" aria-labelledby="hero-title">
  <img
    src="/assets/hero-yoga-playa.jpg"
    alt=""
    aria-hidden="true"
    class="rb-hero__background"
    fetchpriority="high"
    decoding="async"
  >

  <div class="rb-hero__overlay" aria-hidden="true"></div>
  <span class="rb-hero__glow rb-hero__glow--one" aria-hidden="true"></span>
  <span class="rb-hero__glow rb-hero__glow--two" aria-hidden="true"></span>

  <div class="shell rb-hero__shell">
    <div class="rb-hero__copy">
      <p class="rb-hero__eyebrow">RespiraBonito</p>
      <h1 id="hero-title" class="rb-hero-title rb-section-title">Despierta tu ilusión natural por la vida desde hoy</h1>
      <p class="rb-hero-lead">
        Conecta con tu cuerpo, conoce tu mente, siente tu alma
      </p>

      <div class="rb-hero__actions" aria-label="Acciones principales">
        <a
          mat-flat-button
          href="https://forms.gle/KxsRE9NDdr3mrPTx6"
          target="_blank"
          rel="noopener noreferrer"
          class="rb-mat-button rb-mat-button--primary"
          aria-label="Abrir formulario externo para inscribirse en la Escuela RespiraBonito"
        >
          Quiero inscribirme en la Escuela
        </a>
        <a mat-stroked-button href="#metodo" class="rb-mat-button rb-mat-button--secondary rb-hero__secondary-button">
          ¿Quieres conocer mi historia?
        </a>
      </div>
    </div>
  </div>

  <span class="rb-hero__scroll-cue" aria-hidden="true"></span>
</section>
