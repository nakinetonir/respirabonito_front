<section id="metodo" class="section bg-white/70" aria-labelledby="metodo-title">
  <div class="shell">
    <div class="max-w-3xl">
      <p class="rb-kicker">Método Respira Bonito</p>
      <h2 id="metodo-title" class="title mt-2">Un método sencillo para integrar bienestar sin exigirte de más</h2>
      <p class="mt-6 text-lg leading-8 text-rb-ink/80">
        Cada semana encontrarás prácticas y recursos para cuidar cuerpo, mente y vida diaria: movimiento, respiración, rituales, alimentación, arte y encuentros.
      </p>
    </div>
    <div class="grid md:grid-cols-3 gap-6 mt-12">
      <mat-card class="!rounded-[2rem] !p-8 watercolor-card" *ngFor="let p of pillars">
        <h3 class="script text-4xl text-rb-plum">{{p.title}}</h3>
        <p class="mt-4 leading-7 text-rb-ink/80">{{p.text}}</p>
      </mat-card>
    </div>
  </div>
</section>
