<section class="section bg-white/55" id="bloqueos" aria-labelledby="bloqueos-title">
  <div class="shell">
    <h2 id="bloqueos-title" class="title text-center">Cuando necesitas parar sin desconectarte de tu vida</h2>
    <p class="mx-auto mt-5 max-w-3xl text-center text-lg leading-8 text-rb-ink/80">
      A veces el ritmo diario nos lleva a funcionar en automático: muchas tareas, poca escucha, tensión en el cuerpo y dificultad para sostener una rutina de cuidado real.
    </p>
    <div class="grid md:grid-cols-2 gap-5 mt-12">
      <div class="card flex gap-4" *ngFor="let item of points">
        <span class="rb-list-icon" aria-hidden="true">✦</span>
        <p class="text-lg">{{item}}</p>
      </div>
    </div>
  </div>
</section>
<section class="dynamic-flower-lake-section" aria-label="Ilustración de flor y lago de Respira Bonito">
  <div class="dynamic-flower-lake-card">
    <img
      src="/assets/flor-y-lago-lineas-animado.svg"
      alt=""
      aria-hidden="true"
      loading="lazy"
      decoding="async"
      class="dynamic-flower-lake-svg"
    />
  </div>
</section>
