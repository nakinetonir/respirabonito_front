<section id="proceso" class="section rb-process" aria-labelledby="proceso-title">
  <span class="rb-process__aura rb-process__aura--rose" aria-hidden="true"></span>
  <span class="rb-process__aura rb-process__aura--green" aria-hidden="true"></span>
  <span class="rb-process__aura rb-process__aura--blue" aria-hidden="true"></span>

  <div class="shell rb-process__shell">
    <header class="rb-process__heading">
      <h2 id="proceso-title" class="rb-kicker rb-process__title">Proceso</h2>
      <span class="rb-process__heading-line" aria-hidden="true"></span>
    </header>

    <div class="rb-process__journey">
      <div class="rb-process__route" aria-hidden="true">
        <svg viewBox="0 0 1200 300" preserveAspectRatio="none" focusable="false">
          <defs>
            <linearGradient id="rbProcessGradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#a83f68" />
              <stop offset="50%" stop-color="#6f8f6c" />
              <stop offset="100%" stop-color="#738baa" />
            </linearGradient>
            <filter id="rbProcessGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="7" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <path
            class="rb-process__route-shadow"
            d="M 70 170 C 250 20, 360 280, 550 150 S 900 20, 1130 150"
            pathLength="1"
          />
          <path
            class="rb-process__route-line"
            d="M 70 170 C 250 20, 360 280, 550 150 S 900 20, 1130 150"
            pathLength="1"
          />
          <path
            class="rb-process__route-light"
            d="M 70 170 C 250 20, 360 280, 550 150 S 900 20, 1130 150"
            pathLength="1"
          />
        </svg>
        <span class="rb-process__traveller" aria-hidden="true">
          <span></span>
        </span>
      </div>

      <div class="rb-process__steps">
        <article
          class="rb-process__step"
          *ngFor="let p of steps; index as i"
          [style.--step-index]="i"
        >
          <div class="rb-process__node" aria-hidden="true">
            <span class="rb-process__node-orbit"></span>
            <span class="rb-process__node-core">{{ i + 1 }}</span>
          </div>

          <div class="rb-process__card">
            <span class="rb-process__step-label">Paso {{ i + 1 }}</span>
            <h3>{{ p.title }}</h3>
            <p>{{ p.text }}</p>
          </div>
        </article>
      </div>
    </div>

    <div class="rb-process__cta">
      <a
        class="rb-btn"
        href="https://forms.gle/KxsRE9NDdr3mrPTx6"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Abrir formulario externo para inscribirse en la Escuela RespiraBonito"
      >
        Quiero inscribirme en la Escuela
      </a>
    </div>
  </div>
</section>
