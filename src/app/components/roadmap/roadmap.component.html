<section id="viaje" class="section bg-white/70">
  <div class="shell">
    <h2 class="title text-center">Dinámicas del viaje</h2>
    <mat-tab-group class="mt-12">
      <mat-tab label="Cuerpo"><div class="grid md:grid-cols-3 gap-5 mt-8"><div class="card" *ngFor="let h of cuerpo">{{h}}</div></div></mat-tab>
      <mat-tab label="Alma"><div class="grid md:grid-cols-3 gap-5 mt-8"><div class="card" *ngFor="let h of alma">{{h}}</div></div></mat-tab>
      <mat-tab label="Vida diaria"><div class="grid md:grid-cols-3 gap-5 mt-8"><div class="card" *ngFor="let h of vida">{{h}}</div></div></mat-tab>
    </mat-tab-group>
  </div>
</section>
