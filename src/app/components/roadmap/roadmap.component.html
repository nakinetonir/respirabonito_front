<section
  #roadmapSection
  class="journey-section"
  [class.is-roadmap-ready]="mandalaReady"
  id="dinamicas-viaje"
  aria-labelledby="dinamicas-title"
>
  <span class="journey-section__glow journey-section__glow--one" aria-hidden="true"></span>
  <span class="journey-section__glow journey-section__glow--two" aria-hidden="true"></span>

  <div class="journey-shell">
    <header class="journey-header">
      <h2 id="dinamicas-title" class="rb-section-title rb-kicker rb-component-first-text">
        Un viaje desde nuestra energía más básica e instintiva, primer chakra, hasta nuestro centro más elevado y sutil, séptimo chakra
      </h2>
    </header>

    <div class="journey-stage journey-stage--desktop" aria-label="Mandala animado con experiencias dispuestas a su alrededor">
      <div class="journey-mandala-art" aria-hidden="true">
        <span class="journey-mandala-art__halo"></span>
        <span class="journey-mandala-art__aura journey-mandala-art__aura--one"></span>
        <span class="journey-mandala-art__aura journey-mandala-art__aura--two"></span>

        <svg class="journey-mandala-art__svg" viewBox="0 0 700 700" focusable="false">
          <g class="journey-mandala-art__geometry" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <g class="journey-mandala-art__rings">
              <circle cx="350" cy="350" r="58"></circle>
              <circle cx="350" cy="350" r="94"></circle>
              <circle cx="350" cy="350" r="142"></circle>
              <circle cx="350" cy="350" r="198"></circle>
              <circle cx="350" cy="350" r="258"></circle>
              <circle cx="350" cy="350" r="310"></circle>
            </g>

            <g class="journey-mandala-art__star">
              <path d="M350 72 L431 238 L614 265 L482 393 L513 574 L350 488 L187 574 L218 393 L86 265 L269 238 Z"></path>
              <path d="M350 112 L404 260 L560 270 L438 368 L477 520 L350 435 L223 520 L262 368 L140 270 L296 260 Z"></path>
            </g>

            <g class="journey-mandala-art__petals journey-mandala-art__petals--outer">
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(30 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(60 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(90 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(120 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(150 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(180 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(210 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(240 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(270 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(300 350 350)"></path>
              <path d="M350 90 C312 136 316 202 350 250 C384 202 388 136 350 90 Z" transform="rotate(330 350 350)"></path>
            </g>

            <g class="journey-mandala-art__petals journey-mandala-art__petals--middle">
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(45 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(90 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(135 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(180 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(225 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(270 350 350)"></path>
              <path d="M350 176 C322 207 324 253 350 287 C376 253 378 207 350 176 Z" transform="rotate(315 350 350)"></path>
            </g>

            <g class="journey-mandala-art__petals journey-mandala-art__petals--inner">
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z"></path>
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z" transform="rotate(60 350 350)"></path>
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z" transform="rotate(120 350 350)"></path>
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z" transform="rotate(180 350 350)"></path>
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z" transform="rotate(240 350 350)"></path>
              <path d="M350 244 C332 266 333 300 350 324 C367 300 368 266 350 244 Z" transform="rotate(300 350 350)"></path>
            </g>

            <g class="journey-mandala-art__rays">
              <path d="M350 22 L350 58"></path>
              <path d="M350 22 L350 58" transform="rotate(20 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(40 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(60 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(80 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(100 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(120 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(140 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(160 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(180 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(200 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(220 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(240 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(260 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(280 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(300 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(320 350 350)"></path>
              <path d="M350 22 L350 58" transform="rotate(340 350 350)"></path>
            </g>

            <g class="journey-mandala-art__pearls" fill="currentColor" stroke="none">
              <circle cx="350" cy="40" r="4"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(40 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(80 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(120 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(160 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(200 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(240 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(280 350 350)"></circle>
              <circle cx="350" cy="40" r="4" transform="rotate(320 350 350)"></circle>
            </g>
          </g>
        </svg>
      </div>

      <div class="journey-center" aria-hidden="true">
        <span>Respira</span>
        <strong>Bonito</strong>
        <small>Un único viaje</small>
      </div>

      <div class="journey-orbit">
        <article
          class="journey-orb"
          *ngFor="let item of journeyItems; let i = index; trackBy: trackByTitle"
          [style.--angle]="item.angle"
          [style.--accent]="item.accent"
          [style.--i]="i"
          [attr.aria-label]="item.title + '. ' + item.description"
          tabindex="0"
        >
          <div class="journey-orb__anti-spin">
            <div class="journey-orb__flip">
              <div class="journey-orb__face journey-orb__face--front">
                <span class="journey-orb__icon" aria-hidden="true">
                  <mat-icon>{{ item.icon }}</mat-icon>
                </span>
                <h3>{{ item.title }}</h3>
              </div>

              <div class="journey-orb__face journey-orb__face--back" aria-hidden="true">
                <p>{{ item.description }}</p>
              </div>
            </div>
          </div>
        </article>
      </div>
    </div>

    <div
      class="journey-mobile-stage"
      [class.is-mobile-ready]="mandalaReady"
      aria-label="Mandala móvil animado con experiencias orbitando en sentido horario"
    >
      <div class="journey-mobile-giant" aria-hidden="true">
        <div class="journey-mobile-giant__bloom">
          <span class="journey-mobile-giant__glow"></span>
          <svg class="journey-mobile-giant__svg" viewBox="0 0 700 700" focusable="false">
            <g class="journey-mobile-giant__rotor" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="350" cy="350" r="72"></circle>
              <circle cx="350" cy="350" r="132"></circle>
              <circle cx="350" cy="350" r="205"></circle>
              <circle cx="350" cy="350" r="286"></circle>
              <circle cx="350" cy="350" r="326"></circle>

              <g class="journey-mobile-giant__petals journey-mobile-giant__petals--inner">
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(45 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(90 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(135 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(180 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(225 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(270 350 350)"></path>
                <path d="M350 278 C314 240 318 190 350 151 C382 190 386 240 350 278 Z" transform="rotate(315 350 350)"></path>
              </g>

              <g class="journey-mobile-giant__petals journey-mobile-giant__petals--outer">
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(30 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(60 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(90 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(120 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(150 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(180 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(210 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(240 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(270 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(300 350 350)"></path>
                <path d="M350 174 C318 136 322 89 350 56 C378 89 382 136 350 174 Z" transform="rotate(330 350 350)"></path>
              </g>
            </g>
          </svg>
        </div>
      </div>

      <div class="journey-mobile-core" aria-hidden="true">
        <span>Respira</span>
        <strong>Bonito</strong>
      </div>

      <div class="journey-mobile-orbit">
        <article
          class="journey-orb journey-orb--mobile"
          *ngFor="let item of journeyItems; let i = index; trackBy: trackByTitle"
          [style.--angle]="item.angle"
          [style.--accent]="item.accent"
          [style.--i]="i"
          [attr.aria-label]="item.title"
        >
          <div class="journey-orb__anti-spin journey-orb__anti-spin--mobile">
            <div class="journey-orb__flip">
              <div class="journey-orb__face journey-orb__face--front">
                <span class="journey-orb__icon" aria-hidden="true">
                  <mat-icon>{{ item.icon }}</mat-icon>
                </span>
                <h3>{{ item.title }}</h3>
              </div>
            </div>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
