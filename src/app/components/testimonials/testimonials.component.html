<section id="beneficios" class="section bg-rb-roseSoft/70">
  <div class="shell grid lg:grid-cols-[.8fr_1.2fr] gap-10 items-start">
    <div>
      <p class="script text-4xl text-rb-plum">Beneficios</p>
      <h2 class="title mt-2 rb-section-title">¿Qué te aportará inscribirte en la Escuela RespiraBonito?</h2>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="card bg-white/80" *ngFor="let item of benefits">
        <span class="rb-list-icon" aria-hidden="true">✓</span>
        <p class="mt-3 leading-7">{{item}}</p>
      </div>
    </div>
  </div>
</section>
